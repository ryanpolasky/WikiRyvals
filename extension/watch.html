<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WikiRyvals - Watch Party</title>
  <link rel="icon" href="icons/favicon.svg" />
  <style>
    :root {
      --bg: #0f1419; --card: #141a21; --line: #2a313b; --ink: #eaecf0;
      --sub: #9aa3af; --accent: #6699ff; --win: #2fb56b; --loss: #e2554e;
      --orange: #f0883e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink);
           font: 16px/1.4 system-ui, -apple-system, sans-serif; min-height: 100vh; }
    header { display: flex; align-items: center; gap: 12px; padding: 18px 28px;
             border-bottom: 1px solid var(--line); }
    header img { width: 34px; height: 34px; }
    .wordmark { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .wordmark .ry { color: var(--accent); }
    .live-dot { margin-left: auto; display: inline-flex; align-items: center; gap: 8px;
                color: var(--sub); font-size: 13px; font-weight: 600; }
    .live-dot b { width: 9px; height: 9px; border-radius: 999px; background: var(--loss); display: inline-block; }
    .live-dot.on b { background: var(--win); box-shadow: 0 0 10px var(--win); }
    main { max-width: 1000px; margin: 0 auto; padding: 28px; }
    .route { text-align: center; color: var(--sub); font-size: 18px; margin: 6px 0 28px; }
    .route b { color: var(--ink); }
    .route .arrow { color: var(--accent); margin: 0 10px; }
    .meta { text-align: center; color: var(--sub); font-size: 13px; margin-top: -20px; margin-bottom: 26px; }
    .grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .player { background: var(--card); border: 1px solid var(--line); border-radius: 16px;
              padding: 20px; transition: border-color .2s, transform .2s; }
    .player.lead { border-color: var(--accent); }
    .player.done { border-color: var(--win); }
    .player.flagged { border-color: var(--loss); }
    .p-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .p-av { width: 42px; height: 42px; border-radius: 12px; background: var(--accent);
            color: #fff; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .p-name { font-size: 18px; font-weight: 700; }
    .p-team { font-size: 12px; color: var(--sub); }
    .p-cur { font-size: 22px; font-weight: 800; margin: 8px 0 4px; word-break: break-word; }
    .p-cur .pending { color: var(--sub); font-weight: 600; font-size: 16px; }
    .p-stats { display: flex; gap: 18px; color: var(--sub); font-size: 14px; font-weight: 600; margin-top: 8px; }
    .p-badge { float: right; font-size: 12px; font-weight: 800; padding: 3px 9px; border-radius: 999px; }
    .badge-done { background: rgba(47,181,107,.18); color: var(--win); }
    .badge-flag { background: rgba(226,85,78,.18); color: var(--loss); }
    .teams { display: grid; gap: 18px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 720px) { .teams { grid-template-columns: 1fr; } }
    .team-h { font-size: 13px; font-weight: 800; color: var(--sub); text-transform: uppercase;
              letter-spacing: .5px; margin: 0 0 10px; }
    .resolved { text-align: center; margin: 26px 0; }
    .resolved .banner { font-size: 34px; font-weight: 900; }
    .empty { text-align: center; color: var(--sub); padding: 60px 20px; }
    .empty h2 { color: var(--ink); }
  </style>
</head>
<body>
  <header>
    <img src="icons/wr-logo.svg" alt="WR" />
    <div class="wordmark">Wiki<span class="ry">Ry</span>vals</div>
    <span class="live-dot" id="live"><b></b><span id="live-text">connecting…</span></span>
  </header>
  <main>
    <div id="content" class="empty">
      <h2>Loading match…</h2>
      <p>If this stays empty, the match may have ended, or the backend isn't running on :8011.</p>
    </div>
  </main>
  <script src="config.js"></script>
  <script src="watch.js"></script>
</body>
</html>
